[global]
log_level = "info"

[mode.clients]
enabled = true
refresh = true
misbehaviour = false
[mode.connections]
enabled = false
[mode.channels]
enabled = false
[mode.packets]
enabled = true
clear_interval = 20
clear_on_start = true

[[chains]]
id = "wasmd-test"
type = "CosmosSdk"
rpc_addr = "http://wasmd-chain:26657"
grpc_addr = "http://wasmd-chain:9090"
event_source = { mode = "push", url = "ws://wasmd-chain:26657/websocket", batch_delay = "500ms" }
rpc_timeout = "10s"
account_prefix = "wasm"
key_name = "relayer"
store_prefix = "ibc"
gas_price = { price = 0.05, denom = "stake" }
gas_multiplier = 1.3
trusting_period = "10days"

[[chains]]
id = "test-1"
type = "CosmosSdk"
rpc_addr = "http://neutron-chain:26657"
grpc_addr = "http://neutron-chain:9090"
event_source = { mode = "push", url = "ws://neutron-chain:26657/websocket", batch_delay = "500ms" }
rpc_timeout = "10s"
account_prefix = "neutron"
key_name = "relayer"
store_prefix = "ibc"
gas_price = { price = 0.05, denom = "untrn" }
gas_multiplier = 1.3
max_gas = 2000000
trusting_period = "10days"
